<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identidad Visual · Zona en Llamas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { cursor: none; }
        .cursor-dot { position:fixed;width:8px;height:8px;background:var(--rojo);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s; }
        .cursor-ring { position:fixed;width:36px;height:36px;border:1.5px solid rgba(213,14,60,.55);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:opacity .3s; }
        .scroll-progress { position:fixed;top:0;right:0;width:3px;height:0%;background:var(--rojo);z-index:2001;box-shadow:0 0 8px rgba(213,14,60,.7); }

        /* ── NÚMERO FONDO ── */
        .detalle-bg-num {
            position:fixed; top:50%; right:-2%;
            transform:translateY(-50%);
            font-family:'Bebas Neue',sans-serif;
            font-size:clamp(10rem,25vw,22rem);
            color:rgba(255,255,255,.02);
            pointer-events:none; z-index:0;
            letter-spacing:-8px; line-height:1;
            animation:numFlota 14s ease-in-out infinite alternate;
        }
        @keyframes numFlota {
            0%   { transform:translateY(-50%) rotate(-3deg); }
            100% { transform:translateY(-54%) rotate(2deg); }
        }

        /* ── TAG PROYECTO ── */
        .detalle-project-tag {
            position:absolute; top:30px; left:5%;
            font-family:'Bebas Neue',sans-serif;
            font-size:.85rem; letter-spacing:5px; color:var(--gris); z-index:20;
            opacity:0; animation:fadeUp .8s ease .2s forwards;
        }
        .detalle-project-tag span { color:var(--rojo); }
        .detalle-linea-v {
            position:absolute; left:5%; top:55px;
            width:1px; height:0;
            background:linear-gradient(to bottom, var(--rojo), transparent);
            animation:crecerV 1s ease .8s forwards;
        }
        @keyframes crecerV { to { height:60px; } }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── HERO IMAGEN ── */
        .hero-imagen-wrapper {
            animation:revelarCortina 1.2s cubic-bezier(.77,0,.175,1) .8s both,
                       latido 5s ease-in-out 2.5s infinite;
        }
        @keyframes revelarCortina {
            from { clip-path:polygon(0 50%,100% 50%,100% 50%,0 50%); border-color:transparent; }
            to   { clip-path:polygon(0 0,100% 0,100% 100%,0 100%); border-color:var(--rojo); }
        }
        @keyframes latido {
            0%,100% { box-shadow:0 0 0 rgba(213,14,60,0); }
            50%     { box-shadow:0 0 30px rgba(213,14,60,.3); }
        }

        /* ── V3 HERO: caja imagen ── */
        .v3-caja-imagen img {
            clip-path:inset(0 100% 0 0);
            animation:revelarH 1.2s cubic-bezier(.77,0,.175,1) .4s forwards;
        }
        @keyframes revelarH { to { clip-path:inset(0 0% 0 0); } }

        .v3-titulo-caos {
            clip-path:inset(0 0 100% 0);
            animation:revelarAbajo 1s cubic-bezier(.77,0,.175,1) .1s forwards;
        }
        @keyframes revelarAbajo { to { clip-path:inset(0 0 0% 0); } }

        .v3-etiqueta-flotante {
            opacity:0; transform:rotate(-5deg) translateY(10px);
            animation:etiqEntrar .7s ease .9s forwards;
        }
        @keyframes etiqEntrar { to { opacity:1; transform:rotate(-5deg) translateY(0); } }

        /* ── GRILLA EDITORIAL ── */
        .v3-subtitulo {
            overflow:hidden;
        }
        .v3-subtitulo-inner {
            display:block;
            transform:translateY(110%);
            transition:transform 1s cubic-bezier(.77,0,.175,1);
        }
        .v3-subtitulo.en-vista .v3-subtitulo-inner { transform:translateY(0); }

        .v3-columna-texto > p {
            opacity:0; transform:translateY(18px);
            transition:opacity .8s ease .15s, transform .8s ease .15s;
        }
        .v3-columna-texto > p.en-vista { opacity:1; transform:translateY(0); }

        .v3-datos-tecnicos {
            opacity:0; transform:translateX(-20px);
            transition:opacity .8s ease .3s, transform .8s ease .3s;
        }
        .v3-datos-tecnicos.en-vista { opacity:1; transform:translateX(0); }

        .v3-img-wrap {
            opacity:0; transform:translateY(30px) scale(.97);
            transition:opacity .8s ease, transform .8s ease,
                        z-index 0s, border-color .4s, transform .4s, box-shadow .4s;
        }
        .v3-img-wrap.img-1 { transition-delay:0s; }
        .v3-img-wrap.img-2 { transition-delay:.18s; }
        .v3-img-wrap.en-vista { opacity:1; transform:translateY(0) scale(1); }

        /* ── BOTÓN ── */
        .v3-btn-bloque {
            opacity:0; transform:translateY(20px);
            transition:opacity .7s ease, transform .7s ease;
        }
        .v3-btn-bloque.en-vista { opacity:1; transform:translateY(0); }

        /* ── FOOTER ── */
        .footer-title-wrap { overflow:hidden; }
        .footer-title { transform:translateY(80%); transition:transform 1.1s cubic-bezier(.77,0,.175,1); }
        .footer-title.en-vista { transform:translateY(0); }
        .logo { position:relative; display:inline-block; }
    </style>
</head>
<body>

    <div class="cursor-dot"  id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="scroll-progress" id="scrollProgress"></div>
    <div class="detalle-bg-num">01</div>

    <svg style="width:0;height:0;position:absolute;">
        <filter id="filtro-estatica">
            <feTurbulence type="fractalNoise" baseFrequency="0.01 0.3" numOctaves="3" result="ruido"/>
            <feDisplacementMap in="SourceGraphic" in2="ruido" scale="15" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </svg>

    <header id="navbar" class="scrolled">
        <div class="logo">ZONA <span>EN LLAMAS</span></div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
        <nav>
            <ul class="nav-links" id="nav-links">
                <li><a href="inicio.html" data-section="inicio">Origen</a></li>
                <li><a href="inicio.html#forjados" data-section="forjados">Mensaje</a></li>
                <li><a href="inicio.html#reflejos" data-section="reflejos">Reflejos</a></li>
                <li><a href="inicio.html#cierre" data-section="cierre">Cierre</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="detalle-v3-main">

        <div class="detalle-project-tag">PROYECTO <span>[01]</span></div>
        <div class="detalle-linea-v"></div>
        <div class="fondo-marca-agua">RUIDO</div>

        <section class="v3-hero-superpuesto">
            <div class="v3-caja-titulo">
                <h1 class="v3-titulo-caos">
                    IDENTIDAD<br>
                    <span class="text-red">VISUAL</span>
                </h1>
                <div class="v3-etiqueta-flotante">ELEMENTOS</div>
            </div>
            <div class="v3-caja-imagen">
                <img src="imagenes/undecima.jpg" alt="Proyecto">
                <div class="v3-marco-desfasado"></div>
            </div>
        </section>

        </section>

        <div class="v3-navegacion-final">
            <a href="inicio.html#reflejos" class="v3-btn-bloque">
                <span class="v3-btn-texto">VOLVER AL FUEGO</span>
            </a>
        </div>

    </main>

    <footer id="contacto" class="footer">
        <div class="footer-top">
            <div class="footer-title-wrap">
                <h2 class="footer-title">ZONA EN <br><span class="text-red">LLAMAS</span></h2>
            </div>
            <div class="footer-links">
                <div class="link-column">
                    <h3>Navegación</h3>
                    <a href="inicio.html">Origen</a>
                    <a href="inicio.html#forjados">Mensaje</a>
                    <a href="inicio.html#reflejos">Reflejos</a>
                    <a href="contacto.html">Contacto</a>
                </div>
                <div class="link-column">
    <h3>Colaboradores</h3>
    <span>Carol Monroy</span>
    <span>Joshua Morán</span>
</div>
            </div>
        </div>
        <div class="footer-bottom">
            <a href="#" class="back-to-top">↑ VOLVER ARRIBA</a>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
    const dot=document.getElementById('cursorDot'),ring=document.getElementById('cursorRing');
    // No inicializar cursor en dispositivos táctiles
    const esTactil = window.matchMedia('(hover:none) and (pointer:coarse)').matches;
    if(esTactil){ if(dot) dot.style.display='none'; if(ring) ring.style.display='none'; }
    let mx=-200,my=-200,rx=-200,ry=-200;
    if(!esTactil){
    document.addEventListener('mousemove',e=>{ mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px'; });
    (function ar(){ rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar); })();
    }
    document.querySelectorAll('a,button,.v3-img-wrap').forEach(el=>{
        el.addEventListener('mouseenter',()=>{ dot.style.width=dot.style.height='18px';ring.style.opacity='0'; });
        el.addEventListener('mouseleave',()=>{ dot.style.width=dot.style.height='8px';ring.style.opacity='1'; });
    });

    const pb=document.getElementById('scrollProgress');
    window.addEventListener('scroll',()=>{ pb.style.height=(window.scrollY/(document.body.scrollHeight-window.innerHeight)*100)+'%'; },{passive:true});

    const logo=document.querySelector('.logo');
    setInterval(()=>{
        logo.style.textShadow=`3px 0 var(--rojo),-3px 0 rgba(174,174,174,.4)`;
        logo.style.transform=`translateX(${(Math.random()-.5)*5}px)`;
        setTimeout(()=>{ logo.style.textShadow='';logo.style.transform=''; },75);
    },4500+Math.random()*3000);

    const io=new IntersectionObserver(entries=>{
        entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('en-vista'); });
    },{ threshold:0.1 });

    [...document.querySelectorAll('.v3-subtitulo,.v3-columna-texto > p,.v3-datos-tecnicos,.v3-img-wrap,.v3-btn-bloque,.footer-title,.fade-in')].forEach(el=>io.observe(el));
    </script>
</body>
</html>
