<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOMO · Split Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { cursor: none; }
        .cursor-dot { position:fixed;width:8px;height:8px;background:var(--negro);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s; }
        .cursor-ring { position:fixed;width:36px;height:36px;border:1.5px solid rgba(0,0,0,.55);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:opacity .3s; }
        /* el cursor cambia al pasar al lado rojo */
        .v3-split-visual ~ * .cursor-dot { background: var(--blanco); }

        .scroll-progress { position:fixed;top:0;left:0;width:3px;height:0%;background:var(--negro);z-index:2001; }

        /* ── NÚMERO FONDO (lado info) ── */
        .detalle-bg-num {
            position:fixed; bottom:5%; left:3%;
            font-family:'Bebas Neue',sans-serif;
            font-size:clamp(8rem,20vw,18rem);
            color:rgba(255,255,255,.025);
            pointer-events:none; z-index:0;
            letter-spacing:-8px; line-height:1;
            animation:numFlota 14s ease-in-out infinite alternate;
        }
        @keyframes numFlota {
            0%   { transform:rotate(-3deg); }
            100% { transform:rotate(2deg) translateY(-15px); }
        }

        /* ── LADO IZQUIERDO: entradas ── */
        .v3-numero-guia {
            opacity:0; transform:translateY(-20px);
            animation:fadeUp .7s ease .2s forwards;
        }
        @keyframes fadeUp { from { opacity:0;transform:translateY(12px); } to { opacity:1;transform:translateY(0); } }

        .v3-titulo-principal {
            overflow:hidden;
        }
        .v3-titulo-principal .v3-titulo-line {
            display:block;
            transform:translateY(110%);
            animation:subirTit 1.1s cubic-bezier(.77,0,.175,1) forwards;
        }
        .v3-titulo-principal .v3-titulo-line:nth-child(2) { animation-delay:.15s; }
        @keyframes subirTit { to { transform:translateY(0); } }

        .v3-descripcion-box {
            opacity:0; transform:translateY(16px);
            animation:fadeUp .8s ease .5s forwards;
        }
        .v3-meta-data {
            opacity:0; transform:translateY(12px);
            animation:fadeUp .8s ease .7s forwards;
        }

        /* ── LADO DERECHO: imagen revela ── */
        .v3-marco-imagen-solido {
            clip-path:inset(0 100% 0 0);
            animation:revelarH 1.3s cubic-bezier(.77,0,.175,1) .4s forwards,
                       brilloRojo 5s ease-in-out 2.5s infinite;
        }
        @keyframes revelarH { to { clip-path:inset(0 0% 0 0); } }
        @keyframes brilloRojo {
            0%,100% { box-shadow: 20px 20px 0px var(--negro); }
            50%     { box-shadow: 20px 20px 30px rgba(0,0,0,.6); }
        }

        .v3-label-flotante {
            opacity:0; transform:rotate(-90deg) translateX(20px);
            animation:labelEntrar .7s ease 1.5s forwards;
        }
        @keyframes labelEntrar { to { opacity:1; transform:rotate(-90deg) translateX(0); } }

        /* Footer del split */
        .v3-footer-split p {
            opacity:0; transform:translateY(12px);
            animation:fadeUp .8s ease 1.2s forwards;
        }
        .v3-btn-back {
            opacity:0; transform:translateY(12px);
            animation:fadeUp .8s ease 1.4s forwards;
        }

        /* ── LADO DERECHO: fondo blanco ── */
        .v3-split-visual {
            background-color: var(--blanco) !important;
        }
        /* textos que estaban pensados para fondo rojo → ahora negro */
        .v3-footer-split p {
            color: var(--negro) !important;
        }
        .v3-btn-back {
            background: var(--negro) !important;
            color: var(--blanco) !important;
        }
        .v3-btn-back:hover {
            background: var(--rojo) !important;
            color: var(--blanco) !important;
        }
        /* cursor en lado derecho ahora blanco → ajustar a negro/rojo */

        /* ── IMAGEN: adaptarse a sus proporciones naturales ── */
        .v3-marco-imagen-solido {
            height: auto !important;
            border: none !important;
            box-shadow: none !important;
            overflow: hidden;
        }
        .v3-marco-imagen-solido img {
            width: 100% !important;
            height: auto !important;       /* respeta proporción original */
            object-fit: contain !important;
            display: block;
            filter: none !important;       /* quita el grayscale */
        }
        /* al hacer hover, sin cambio de filtro ya que está a color */
        .v3-marco-imagen-solido:hover img {
            filter: none !important;
        }

        /* ── FOOTER ── */
        .footer-title-wrap { overflow:hidden; }
        .footer-title { transform:translateY(80%); transition:transform 1.1s cubic-bezier(.77,0,.175,1); }
        .footer-title.en-vista { transform:translateY(0); }
        .logo { position:relative; display:inline-block; }
    </style>
</head>
<body class="body-detalle-split">

    <div class="cursor-dot"  id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="scroll-progress" id="scrollProgress"></div>

    <header id="navbar" class="scrolled">
        <div class="logo">ZONA <span>EN LLAMAS</span></div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
        <nav>
            <ul class="nav-links" id="nav-links">
                <li><a href="inicio.html" data-section="inicio">Origen</a></li>
                <li><a href="inicio.html#forjados" data-section="forjados">Mensaje</a></li>
                <li><a href="inicio.html#reflejos" data-section="reflejos">Reflejos</a></li>
                <li><a href="inicio.html#cierre" data-section="cierre">Cierre</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="v3-split-layout">

        <!-- LADO IZQUIERDO -->
        <section class="v3-split-info">
            <div class="v3-content-wrapper">
                <h1 class="v3-titulo-principal">
                    <span class="v3-titulo-line">FOMO</span>
                    <span class="v3-titulo-line text-stroke">Fear of Missing Out</span>
                </h1>

            </div>
        </section>

        <!-- LADO DERECHO -->
        <section class="v3-split-visual">
            <div class="v3-marco-imagen-solido">
                <img src="imagenes/ZONA.jpg" alt="Proyecto Visual">
            </div>
            <div class="v3-footer-split">
                <p>EL CAOS ES UNA FORMA DE ORDEN</p>
                <a href="inicio.html#reflejos" class="v3-btn-back">REGRESAR</a>
            </div>
        </section>

    </main>

    <footer id="contacto" class="footer">
        <div class="footer-top">
            <div class="footer-title-wrap">
                <h2 class="footer-title">ZONA EN <br><span class="text-red">LLAMAS</span></h2>
            </div>
            <div class="footer-links">
                <div class="link-column">
                    <h3>Navegación</h3>
                    <a href="inicio.html">Origen</a>
                    <a href="inicio.html#forjados">Mensaje</a>
                    <a href="inicio.html#reflejos">Reflejos</a>
                    <a href="contacto.html">Contacto</a>
                </div>
                <div class="link-column">
                    <h3>Colaboradores</h3>
                    <span>Carol Monroy</span>
                    <span>Joshua Morán</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
    // Cursor: cambia color según el lado de la pantalla (negro/blanco vs rojo)
    const dot=document.getElementById('cursorDot'),ring=document.getElementById('cursorRing');
    const esTactil = window.matchMedia('(hover:none) and (pointer:coarse)').matches;
    if(esTactil){ if(dot) dot.style.display='none'; if(ring) ring.style.display='none'; }
    let mx=-200,my=-200,rx=-200,ry=-200;
    if(!esTactil){
    document.addEventListener('mousemove',e=>{
        mx=e.clientX; my=e.clientY;
        dot.style.left=mx+'px'; dot.style.top=my+'px';
        const isDerecho = mx > window.innerWidth/2;
        dot.style.background   = isDerecho ? 'var(--negro)' : 'var(--rojo)';
        ring.style.borderColor = isDerecho ? 'rgba(0,0,0,.6)' : 'rgba(213,14,60,.55)';
    });
    (function ar(){ rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar); })();
    }
    document.querySelectorAll('a,button').forEach(el=>{
        el.addEventListener('mouseenter',()=>{ dot.style.width=dot.style.height='18px';ring.style.opacity='0'; });
        el.addEventListener('mouseleave',()=>{ dot.style.width=dot.style.height='8px';ring.style.opacity='1'; });
    });

    const pb=document.getElementById('scrollProgress');
    window.addEventListener('scroll',()=>{ pb.style.height=(window.scrollY/(document.body.scrollHeight-window.innerHeight)*100)+'%'; },{passive:true});

    const logo=document.querySelector('.logo');
    setInterval(()=>{
        logo.style.textShadow=`3px 0 var(--rojo),-3px 0 rgba(174,174,174,.4)`;
        logo.style.transform=`translateX(${(Math.random()-.5)*5}px)`;
        setTimeout(()=>{ logo.style.textShadow='';logo.style.transform=''; },75);
    },4500+Math.random()*3000);

    const io=new IntersectionObserver(entries=>{
        entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('en-vista'); });
    },{ threshold:0.1 });
    [...document.querySelectorAll('.footer-title,.fade-in')].forEach(el=>io.observe(el));
    </script>
</body>
</html>
